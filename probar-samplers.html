<!DOCTYPE html>
<html lang="es-419">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Probar samplers | Batería Champetera</title>
  <meta name="robots" content="noindex, nofollow">
  <meta name="description" content="Herramienta interna para escuchar archivos de audio antes de subirlos a la batería.">
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="styles/reset.css">
  <link rel="stylesheet" href="styles/common.css">
  <link rel="stylesheet" href="styles/probar-samplers.css">
</head>
<body class="sampler-preview-page">
  <main>
    <section class="sampler-preview content-card">
      <h1>Probar samplers</h1>
      <p class="sampler-preview-lead">
        Escucha archivos <strong>.wav</strong> o <strong>.mp3</strong> que te manden antes de copiarlos a <code>samplers/</code>.
      </p>

      <div id="drop-zone" class="drop-zone" tabindex="0" role="button" aria-label="Zona para soltar archivos de audio">
        <p>Arrastra archivos aquí</p>
        <p class="drop-zone-hint">o</p>
        <label class="file-picker-btn">
          Elegir archivos
          <input id="file-input" type="file" accept=".wav,.mp3,audio/wav,audio/mpeg,audio/*" multiple hidden>
        </label>
      </div>

      <div class="volume-row">
        <label for="preview-volume">Volumen</label>
        <input id="preview-volume" type="range" min="0" max="1" step="0.01" value="0.85">
        <span id="preview-volume-label">85%</span>
      </div>

      <p id="preview-status" class="preview-status" aria-live="polite"></p>

      <ul id="preview-list" class="preview-list" hidden></ul>

      <p class="sampler-preview-back">
        <a href="virtual.html">← Volver a la batería</a>
      </p>
    </section>
  </main>

  <script type="module" src="js/probar-samplers.js"></script>
</body>
</html>
